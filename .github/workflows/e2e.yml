name: E2E Tests

on:
  pull_request:
    # `edited`를 포함해서 PR body의 `tpc-agent-tag:` 마커 추가/변경 시 재실행되도록 한다.
    types: [opened, synchronize, edited]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ !startsWith(github.head_ref, 'release-please--') }}
    outputs:
      should_run: ${{ steps.filter.outputs.syncer_l10n_storage }}
      backend_image: ${{ steps.backend.outputs.image }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            syncer_l10n_storage:
              - 'packages/syncer-l10n-storage/**'
              - 'packages/core/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/e2e.yml'

      - name: Resolve backend image from PR body
        # PR description에 `tpc-agent-tag: <tag>` 한 줄이 있으면 그 태그의 tpc-agent PR 빌드 이미지로
        # e2e를 돌린다. 마커가 없으면 기본 BACKEND_IMAGE secret으로 fallback.
        id: backend
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          TAG=$(printf '%s\n' "$PR_BODY" \
            | grep -iE '^[[:space:]]*tpc-agent-tag:[[:space:]]*[A-Za-z0-9._-]+[[:space:]]*$' \
            | head -1 \
            | sed -E 's/^[[:space:]]*[^:]+:[[:space:]]*//; s/[[:space:]]*$//')
          if [ -n "$TAG" ]; then
            IMAGE="gcr.io/tpc-misc/tpc-misc-tpc-agent:${TAG}"
            echo "Using tpc-agent image: ${IMAGE}"
            echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          else
            echo "No tpc-agent-tag marker in PR body; using default backend image"
            echo "image=" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: changes
    # fork PR에서는 OIDC/secrets 접근이 안 되므로 동일 리포 PR에서만 실행
    if: |
      needs.changes.outputs.should_run == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: e2e-pr${{ github.event.number }}
      cancel-in-progress: true
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write

    env:
      # PR body의 tpc-agent-tag 마커가 있으면 그 PR 빌드 이미지를, 없으면 기본 secret 이미지를 사용한다.
      BACKEND_IMAGE: ${{ needs.changes.outputs.backend_image || secrets.BACKEND_IMAGE }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/299329474524/locations/global/workloadIdentityPools/github/providers/my-repo
          service_account: ci-e2e@tpc-misc.iam.gserviceaccount.com

      - run: gcloud auth configure-docker --quiet

      - name: Start tpc-agent backend
        run: docker compose -f packages/syncer-l10n-storage/docker-compose.yml up -d --wait

      - name: Setup node with cached node_modules
        uses: ./.github/actions/setup-node-cached
        with:
          node-version: 22

      - name: Build
        run: npm run build

      - name: Run E2E tests
        env:
          TPC_AGENT_URL: http://localhost:5100
          TPC_AGENT_TOKEN: ${{ secrets.TPC_AGENT_DEV_TOKEN }}
        run: npm run test:e2e -w l10n-tools-syncer-l10n-storage

      - name: Backend logs (on failure)
        if: failure()
        run: docker compose -f packages/syncer-l10n-storage/docker-compose.yml logs

      - name: Teardown backend
        if: always()
        run: docker compose -f packages/syncer-l10n-storage/docker-compose.yml down
